# Netlify configuration for National League website
# This file configures how Netlify handles routing and builds

[build]
  # The directory Netlify will publish from (current directory where netlify.toml is located)
  publish = "."
  
  # No build command needed for static site
  command = "echo 'Static site - no build needed'"

# Redirect rules for SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set proper headers for better performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"